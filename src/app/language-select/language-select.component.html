<ion-header>
  <ion-toolbar>
    <ion-title>Select Languages</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="dismiss()">Translate</ion-button>
    </ion-buttons>
  </ion-toolbar>
  <ion-toolbar>
    <ion-searchbar [(ngModel)]="searchTerm" placeholder="Search"></ion-searchbar>
  </ion-toolbar>
</ion-header>

<ion-content>
  <ion-list>
    <ion-item *ngFor="let lang of filteredLanguages">
      <ion-label>{{ lang.name }}</ion-label>
      <ion-checkbox slot="end" [checked]="isSelected(lang.code)" (ionChange)="toggleSelection(lang.code)"></ion-checkbox>
    </ion-item>
  </ion-list>
</ion-content>
